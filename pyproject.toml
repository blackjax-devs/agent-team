[project]
name = "agent-team"
version = "0.1.0"
description = "A configurable, Bayesian-aware multi-agent dev team on sagent + the Claude CLI. Default profile: building/debugging apps that use BlackJAX."
requires-python = ">=3.12"
readme = "README.md"
license = { text = "MIT" }
dependencies = [
    # sagent: tracked at upstream main via a DIRECT URL (not [tool.uv.sources]),
    # so the pin TRAVELS with a from-git install — `uvx --from git+…/agent-team`
    # and `uv tool install git+…/agent-team` resolve sagent from main too, no
    # `--with` override needed. PyPI 0.1.6 predates the merged provider work
    # (PR #177: session_id / subprocess_read_timeout_sec on model(), the
    # CancelledError->SIGINT interrupt path), so the PyPI release won't work yet.
    # Once sagent ships >=0.1.7, switch this to a plain "sagent>=0.1.7".
    "sagent @ git+https://github.com/rekursiv-ai/sagent.git@main",
    "starlette",
    "uvicorn",
    "mcp",
]

[project.scripts]
agent-team = "agent_team.serve:main"
agent-team-merge = "agent_team.merge_jsonl:main"

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["agent_team*"]

# Ship the non-.py data that the package needs to work out of the box: the
# web UI HTML (resolved via importlib.resources in serve.py) and the bundled
# default profile (team.toml + role prompts, resolved in team_profile.py).
# setuptools only ships declared package-data for non-.py files.
[tool.setuptools.package-data]
agent_team = [
    "web/*.html",
    "profiles/**/*.toml",
    "profiles/**/*.md",
]
