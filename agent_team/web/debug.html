<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>debug · agent-team chat (powered by Sagent)</title>
<script>
  (function () {
    var t = null;
    try { t = localStorage.getItem('channel-theme'); } catch (e) {}
    if (!t) {
      t = (window.matchMedia &&
           window.matchMedia('(prefers-color-scheme: light)').matches)
          ? 'light' : 'dark';
    }
    if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
  })();
</script>
<style>
  :root {
    --bg: #1e1f22; --bg-panel: #2b2d31; --bg-input: #383a40; --bg-hover: #3a3c43;
    --text: #dbdee1; --text-dim: #949ba4; --text-mute: #6e7178;
    --accent: #5865f2; --divider: #3f4147; --shadow: rgba(0,0,0,0.4);
    --hit: rgba(88,101,242,0.18);
    --ok: #4ade80; --warn: #fbbf24; --bad: #f87171; --neutral: #6e7178;
    --role-user: #00ccff; --role-system: #6e7178; --role-tl: #ffc107;
    --role-swe: #4ade80; --role-junior-swe: #2e7d32; --role-statistician: #e040fb;
    --role-tech-writer: #60a5fa; --role-default: #cccccc;
  }
  :root[data-theme="light"] {
    --bg: #ffffff; --bg-panel: #f5f6f8; --bg-input: #eceef2; --bg-hover: #e4e7ec;
    --text: #1d1c1d; --text-dim: #5e6470; --text-mute: #8a8f99;
    --accent: #5865f2; --divider: #d6d9de; --shadow: rgba(0,0,0,0.12);
    --hit: rgba(88,101,242,0.14);
    --ok: #15803d; --warn: #b45309; --bad: #b91c1c; --neutral: #8a8f99;
    --role-user: #0284c7; --role-system: #6e7178; --role-tl: #b45309;
    --role-swe: #15803d; --role-junior-swe: #166534; --role-statistician: #a21caf;
    --role-tech-writer: #1d4ed8; --role-default: #525252;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.4;
    display: flex; flex-direction: column; height: 100vh;
  }
  .mono, pre, code, .ctx-row, .ev-line {
    font-family: "SF Mono", "Menlo", "Consolas", monospace; font-size: 11.5px;
  }
  button, input, select { font-family: inherit; }

  header {
    display: flex; align-items: center; gap: 14px; padding: 0 16px; height: 48px;
    background: var(--bg-panel); border-bottom: 1px solid var(--divider); flex: 0 0 auto;
  }
  header .title { font-weight: 600; }
  header .spacer { flex: 1; }
  .tabs { display: flex; gap: 4px; }
  .tab {
    background: none; border: none; color: var(--text-dim); cursor: pointer;
    padding: 6px 14px; border-radius: 6px; font-size: 13px;
  }
  .tab:hover { background: var(--bg-hover); color: var(--text); }
  .tab.active { background: var(--bg-input); color: var(--text); font-weight: 600; }
  .pill {
    background: var(--bg-input); border: 1px solid var(--divider); color: var(--text-dim);
    border-radius: 12px; padding: 2px 10px; font-size: 11px; cursor: pointer;
  }
  .pill:hover { color: var(--text); background: var(--bg-hover); }

  .view { flex: 1; min-height: 0; display: none; }
  .view.active { display: flex; }

  /* ---- search view ---- */
  #view-search { flex-direction: column; }
  .searchbar {
    display: flex; align-items: center; gap: 10px; padding: 12px 16px;
    border-bottom: 1px solid var(--divider); flex: 0 0 auto;
  }
  .searchbar input {
    flex: 1; background: var(--bg-input); border: 1px solid transparent;
    border-radius: 6px; padding: 8px 12px; color: var(--text); font-size: 14px;
  }
  .searchbar select {
    background: var(--bg-input); border: 1px solid transparent; border-radius: 6px;
    padding: 7px 8px; color: var(--text); font-size: 13px;
  }
  .searchbar .count {
    font-size: 12px; color: var(--text-mute); font-variant-numeric: tabular-nums;
    white-space: nowrap; min-width: 90px; text-align: right;
  }
  .split { flex: 1; min-height: 0; display: grid; grid-template-columns: 1fr 1fr; }
  .results { overflow-y: auto; border-right: 1px solid var(--divider); }
  .context { overflow-y: auto; background: var(--bg-panel); }
  .hint { padding: 20px 18px; color: var(--text-mute); font-size: 13px; }
  .hint code { background: var(--bg-input); padding: 1px 5px; border-radius: 4px; }

  .result { border-bottom: 1px solid var(--divider); padding: 8px 14px; cursor: pointer; }
  .result:hover { background: var(--bg-hover); }
  .result.active { background: var(--bg-hover); box-shadow: inset 3px 0 0 var(--accent); }
  .result .head { display: flex; align-items: baseline; gap: 8px; }
  .badge {
    font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 10px;
    white-space: nowrap; flex: 0 0 auto;
  }
  .result .ts { color: var(--text-mute); font-size: 11px; font-variant-numeric: tabular-nums; flex: 0 0 auto; }
  .result .kind { color: var(--text-dim); font-size: 11px; flex: 0 0 auto; }
  .result .to { color: var(--text-dim); font-size: 11.5px; flex: 0 0 auto; }
  .result .snip { color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; font-size: 12.5px; }
  mark { background: rgba(88,101,242,0.32); color: inherit; border-radius: 2px; }

  .ctx-header { padding: 10px 14px; border-bottom: 1px solid var(--divider); color: var(--text-dim); font-size: 12px; position: sticky; top: 0; background: var(--bg-panel); }
  .ctx-row { padding: 4px 14px; border-bottom: 1px solid var(--divider); white-space: pre-wrap; word-break: break-word; color: var(--text-dim); }
  .ctx-row.hit { background: var(--hit); color: var(--text); }
  .ctx-row .ets { color: var(--text-mute); margin-right: 8px; }
  .ctx-row .mk-begin { color: var(--ok); }
  .ctx-row .mk-end { color: var(--warn); }
  .ctx-row .mk-name { color: var(--accent); font-weight: 600; }
  .ctx-row .mk-posted { color: var(--ok); font-weight: 600; }
  .ctx-row .mk-supp { color: var(--text-mute); font-weight: 600; }
  .ctx-row details { margin-top: 4px; }
  .ctx-row summary {
    color: var(--accent); cursor: pointer; font-size: 11px;
    list-style: none; user-select: none;
  }
  .ctx-row summary::-webkit-details-marker { display: none; }
  .ctx-row summary::before { content: '▸ '; }
  .ctx-row details[open] summary::before { content: '▾ '; }
  .ctx-row details pre {
    white-space: pre-wrap; word-break: break-word;
    margin: 4px 0 2px; padding: 6px 8px;
    background: var(--bg-input); border-radius: 4px;
    max-height: 320px; overflow: auto; color: var(--text);
  }
  /* message context rows */
  .ctx-msg { padding: 6px 14px; border-bottom: 1px solid var(--divider); }
  .ctx-msg.hit { background: var(--hit); }
  .ctx-msg .m-meta { font-size: 11px; color: var(--text-mute); margin-bottom: 2px; }
  .ctx-msg .m-body { font-size: 12.5px; white-space: pre-wrap; word-break: break-word; color: var(--text); }

  /* ---- agents view ---- */
  #view-agents { flex-direction: column; overflow-y: auto; padding: 12px 16px; }
  .agents-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; color: var(--text-mute); font-size: 12px; }
  .agent {
    border: 1px solid var(--divider); border-radius: 10px; background: var(--bg-panel);
    padding: 10px 14px; margin-bottom: 10px;
  }
  .agent .row1 { display: flex; align-items: center; gap: 10px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 auto; }
  .agent .name { font-weight: 700; }
  .agent .status { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
  .agent .facts { color: var(--text-mute); font-size: 11.5px; font-variant-numeric: tabular-nums; }
  .agent .facts b { color: var(--text-dim); font-weight: 600; }
  .agent .diagnosis { margin-top: 6px; font-size: 12.5px; }
  .agent .inflight { margin-top: 4px; font-size: 12px; color: var(--warn); }
  .agent .inflight code { background: var(--bg-input); padding: 1px 6px; border-radius: 4px; }
  .agent .pending-list { margin-top: 6px; }
  .agent .pending-list .plabel { font-size: 11px; color: var(--text-mute); margin-bottom: 2px; }
  .agent .pending-list .ev-line { color: var(--text-dim); padding: 1px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .agent .pending-list .ets { color: var(--text-mute); margin: 0 6px; }
  .agent details.recent-d { margin-top: 8px; }
  .agent details.recent-d summary { color: var(--text-mute); cursor: pointer; font-size: 11px; list-style: none; user-select: none; }
  .agent details.recent-d summary::-webkit-details-marker { display: none; }
  .agent details.recent-d summary::before { content: '▸ '; }
  .agent details.recent-d[open] summary::before { content: '▾ '; }
  .agent .recent { margin-top: 6px; border-top: 1px solid var(--divider); padding-top: 6px; }
  .agent .recent .ev-line { color: var(--text-dim); padding: 1px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .agent .recent .ev-line .ets { color: var(--text-mute); margin-right: 6px; }
  .agent .recent .ev-line .k { color: var(--text-mute); }
  .agent .agent-actions { margin-top: 8px; display: flex; gap: 8px; }
  .agent .agent-actions .restart {
    background: var(--bg-input); border: 1px solid var(--divider); color: var(--text-dim);
    border-radius: 6px; padding: 3px 10px; font-size: 11px; cursor: pointer;
  }
  .agent .agent-actions .restart:hover { background: var(--bad); border-color: var(--bad); color: #fff; }
  .agent .agent-actions .restart:disabled { opacity: 0.5; cursor: default; }
  .restart-out {
    margin: 0 0 10px; padding: 8px 10px; background: var(--bg-panel);
    border: 1px solid var(--divider); border-radius: 8px;
    font-family: "SF Mono", "Menlo", "Consolas", monospace; font-size: 11px;
    white-space: pre-wrap; word-break: break-word; color: var(--text-dim); max-height: 200px; overflow: auto;
  }
  .restart-out[hidden] { display: none; }
  .s-dead { color: var(--bad); } .bg-dead { background: var(--bad); }
  .s-hung { color: var(--warn); } .bg-hung { background: var(--warn); }
  .s-stuck { color: var(--warn); } .bg-stuck { background: var(--warn); }
  .s-working { color: var(--ok); } .bg-working { background: var(--ok); }
  .s-idle { color: var(--neutral); } .bg-idle { background: var(--neutral); }
</style>
</head>
<body>

<header>
  <a class="pill" href="/" style="text-decoration:none"
     title="Back to the live channel">← 💬 agent-team chat</a>
  <span class="title">🔧 debug</span>
  <div class="tabs">
    <button class="tab active" data-view="agents" type="button">Agents</button>
    <button class="tab" data-view="search" type="button">Search</button>
  </div>
  <span class="spacer"></span>
  <button id="theme-toggle" class="pill" title="Toggle light/dark" type="button">dark</button>
</header>

<div id="view-search" class="view">
  <div class="searchbar">
    <input id="q" type="text" autocomplete="off" autofocus
           placeholder="Find exact text across the full history of every trace + the message log…" />
    <select id="scope" title="What to search">
      <option value="traces">All traces</option>
      <option value="messages">Messages</option>
      <option value="all">Traces + messages</option>
    </select>
    <span id="count" class="count"></span>
  </div>
  <div class="split">
    <div id="results" class="results">
      <div class="hint">
        Server-side search over the <strong>full</strong> history of every
        <code>sessions/*.trace.jsonl</code> and <code>main.jsonl</code>.
        Click a hit to <strong>show context</strong> (5 before / after) in
        the panel on the right.
      </div>
    </div>
    <div id="context" class="context">
      <div class="hint">Select a result to show its surrounding context here.</div>
    </div>
  </div>
</div>

<div id="view-agents" class="view active">
  <div class="agents-bar">
    <span id="agents-updated">—</span>
    <button id="agents-refresh" class="pill" type="button">refresh</button>
    <span>auto-refreshes every 4s while this tab is open</span>
  </div>
  <pre id="restart-out" class="restart-out" hidden></pre>
  <div id="agents"></div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const ROLE_COLOR = {
  user: 'var(--role-user)', system: 'var(--role-system)', tl: 'var(--role-tl)',
  swe: 'var(--role-swe)', 'junior-swe': 'var(--role-junior-swe)',
  statistician: 'var(--role-statistician)', 'tech-writer': 'var(--role-tech-writer)',
};
const roleColor = (r) => ROLE_COLOR[r] || 'var(--role-default)';
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => (
  { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
const fmtTime = (iso) => (iso || '').slice(11, 19);
async function getJSON(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`${r.status}`);
  return r.json();
}
function hl(text, q) {
  if (!q) return esc(text);
  const i = text.toLowerCase().indexOf(q.toLowerCase());
  if (i < 0) return esc(text);
  return esc(text.slice(0, i)) + '<mark>' +
         esc(text.slice(i, i + q.length)) + '</mark>' + esc(text.slice(i + q.length));
}
function hlAll(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return text.split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// ---- tabs ----
let agentsTimer = null;
function showView(v) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === v));
  $('view-search').classList.toggle('active', v === 'search');
  $('view-agents').classList.toggle('active', v === 'agents');
  if (v === 'agents') {
    loadAgents();
    agentsTimer = setInterval(loadAgents, 4000);
    if (history.replaceState) history.replaceState(null, '', '#agents');
  } else {
    if (agentsTimer) { clearInterval(agentsTimer); agentsTimer = null; }
    $('q').focus();
    if (history.replaceState) history.replaceState(null, '', '#search');
  }
}
document.querySelectorAll('.tab').forEach(t =>
  t.addEventListener('click', () => showView(t.dataset.view)));

// ---- search ----
// Sagent trace events have a different shape than chat/'s. Each line is
// {_event, _ts, _n, ...fields}. The most useful kinds for the search
// timeline are:
//   - UserMessage / AgentSendMessage : the inbound that triggered a turn
//   - AssistantMessage / ModelResponseComplete : the assistant output
//   - ModelCallStarted / ModelResponsePartial / ModelIdle : stream lifecycle
//   - AgentIdle : agent went back to idle
//   - ToolLabel : MCP-side tool dispatch label (text channel)
//   - SaveSession / CohortStarted / CohortComplete : housekeeping
function traceEventLine(ev, q) {
  const kind = ev._event || '?';
  const ts = `<span class="ets">${fmtTime(ev._ts)}</span>`;
  if (kind === 'UserMessage' || kind === 'AgentSendMessage') {
    const src = kind === 'AgentSendMessage' ? (ev.source || '?') : 'user';
    const body = (ev.text || '').split('\n').find(l => l.trim()) || '';
    return `${ts}<span class="mk-begin">▶ inbound</span> from @${esc(src)}  ${hl(body.slice(0,260), q)}`;
  }
  if (kind === 'ModelCallStarted') {
    return `${ts}● model_call_started`;
  }
  if (kind === 'ModelResponsePartial') {
    const t = (ev.text || '').replace(/\n/g, ' ');
    return t ? `${ts}<span class="mk-name">stream</span> ${hl(t.slice(0,200), q)}` : '';
  }
  if (kind === 'ModelResponseComplete') {
    const m = ev.message || {};
    const tcs = (m.tool_calls || []).map(t => t.name).filter(Boolean).join(', ');
    const txt = (m.text || '').split('\n').find(l => l.trim()) || '';
    const tail = tcs ? ` tool_use=[${esc(tcs)}]` : '';
    return `${ts}<span class="mk-end">■ assistant</span>${tail}  ${hl(txt.slice(0,260), q)}`;
  }
  if (kind === 'ModelResponseError') {
    return `${ts}● <span class="mk-supp">ERROR</span> ${esc(ev.error || 'unknown')}`;
  }
  if (kind === 'ModelIdle' || kind === 'AgentIdle') {
    return `${ts}● ${esc(kind.toLowerCase())}`;
  }
  if (kind === 'ToolLabel') {
    return `${ts}<span class="mk-name">tool</span> ${hl((ev.text || '').slice(0,160), q)}`;
  }
  if (kind === 'CohortStarted' || kind === 'CohortComplete' || kind === 'SaveSession') {
    return `${ts}<span style="color:var(--text-mute)">${esc(kind)}</span>`;
  }
  return `${ts}${esc(kind)}`;
}
// Expandable full text for an event (mirrors the live trace panel's
// [show full input/output] affordance).
function traceEventFull(ev) {
  const kind = ev._event || '?';
  if ((kind === 'UserMessage' || kind === 'AgentSendMessage') && ev.text) {
    return { label: 'full inbound', text: ev.text };
  }
  if (kind === 'ModelResponseComplete' && ev.message && ev.message.text) {
    return { label: 'full assistant text', text: ev.message.text };
  }
  if (kind === 'ModelResponsePartial' && ev.text) {
    return { label: 'partial', text: ev.text };
  }
  return null;
}

async function showContext(res, q) {
  const ctx = $('context');
  ctx.innerHTML = '<div class="hint">loading context…</div>';
  try {
    if (res.source === 'trace') {
      const d = await getJSON(`/api/trace/${res.role}?around=${res.idx}&ctx=5`);
      let html = `<div class="ctx-header">@${esc(res.role)} trace · events ${d.offset}–${d.offset + d.events.length - 1} of ${d.total} · context around the hit</div>`;
      d.events.forEach((ev, i) => {
        const line = traceEventLine(ev, q);
        if (!line) return;
        const full = traceEventFull(ev);
        const det = full
          ? `<details><summary>show ${full.label}</summary><pre>${hlAll(full.text, q)}</pre></details>`
          : '';
        html += `<div class="ctx-row${d.offset + i === d.hit ? ' hit' : ''}">${line}${det}</div>`;
      });
      ctx.innerHTML = html;
    } else {
      const d = await getJSON(`/api/messages?around=${res.idx}&ctx=5`);
      // Sagent returns "records" instead of chat/'s "messages".
      const records = d.records || d.messages || [];
      let html = `<div class="ctx-header">channel · records ${d.offset}–${d.offset + records.length - 1} of ${d.total} · context around the hit</div>`;
      records.forEach((m, i) => {
        const isHit = d.offset + i === d.hit;
        const to = (m.to || []).map(r => `<span style="color:${roleColor(r)}">@${esc(r)}</span>`).join(' ');
        html += `<div class="ctx-msg${isHit ? ' hit' : ''}">` +
                `<div class="m-meta"><span style="color:${roleColor(m.from)}">@${esc(m.from)}</span> → ${to} · ${fmtTime(m.ts)}</div>` +
                `<div class="m-body">${hl(m.body || '', q)}</div></div>`;
      });
      ctx.innerHTML = html;
    }
    const hit = ctx.querySelector('.hit');
    if (hit) hit.scrollIntoView({ block: 'center' });
  } catch (e) {
    ctx.innerHTML = `<div class="hint">context load failed: ${esc(e.message)}</div>`;
  }
}

function renderResult(res, q) {
  const el = document.createElement('div');
  el.className = 'result';
  if (res.source === 'trace') {
    el.innerHTML = `<div class="head">` +
      `<span class="badge" style="color:${roleColor(res.role)};border:1px solid ${roleColor(res.role)}">@${esc(res.role)}</span>` +
      `<span class="ts">${fmtTime(res.ts)}</span><span class="kind">${esc(res.kind)}</span>` +
      `<span class="snip">${hl(res.snippet, q)}</span></div>`;
  } else {
    const to = (res.to || []).map(r => `<span style="color:${roleColor(r)}">@${esc(r)}</span>`).join(' ');
    el.innerHTML = `<div class="head">` +
      `<span class="badge" style="color:${roleColor(res.from)};border:1px solid ${roleColor(res.from)}">@${esc(res.from)}</span>` +
      `<span class="to">→ ${to}</span><span class="ts">${fmtTime(res.ts)}</span>` +
      `<span class="snip">${hl(res.snippet, q)}</span></div>`;
  }
  el.addEventListener('click', () => {
    document.querySelectorAll('.result.active').forEach(r => r.classList.remove('active'));
    el.classList.add('active');
    showContext(res, q);
  });
  return el;
}

let timer = null, lastQ = '';
async function runSearch() {
  const q = $('q').value.trim();
  const scope = $('scope').value;
  lastQ = q;
  const results = $('results');
  if (!q) {
    $('count').textContent = '';
    results.innerHTML = '<div class="hint">Type to search the full archive.</div>';
    return;
  }
  $('count').textContent = '…';
  try {
    const d = await getJSON(`/api/search?q=${encodeURIComponent(q)}&scope=${scope}&limit=300`);
    if (d.q !== lastQ) return;
    results.innerHTML = '';
    if (!d.results.length) {
      results.innerHTML = '<div class="hint">No exact matches.</div>';
      $('count').textContent = '0';
      return;
    }
    $('count').textContent = d.results.length + (d.truncated ? '+ (capped)' : '');
    const frag = document.createDocumentFragment();
    d.results.forEach(res => frag.appendChild(renderResult(res, q)));
    results.appendChild(frag);
  } catch (e) {
    results.innerHTML = `<div class="hint">search failed: ${esc(e.message)}</div>`;
    $('count').textContent = '';
  }
}
$('q').addEventListener('input', () => { clearTimeout(timer); timer = setTimeout(runSearch, 250); });
$('q').addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); clearTimeout(timer); runSearch(); } });
$('scope').addEventListener('change', runSearch);

// ---- agents ----
function ago(sec) {
  if (sec == null) return 'never';
  if (sec < 60) return sec + 's ago';
  if (sec < 3600) return Math.floor(sec / 60) + 'm ago';
  return Math.floor(sec / 3600) + 'h ago';
}
function recentLine(ev) {
  const ts = `<span class="ets">${fmtTime(ev.ts)}</span>`;
  const k = `<span class="k">${esc(ev.kind)}</span>`;
  return `<div class="ev-line">${ts}${k} ${esc((ev.summary || '').slice(0, 160))}</div>`;
}
async function loadAgents() {
  try {
    const d = await getJSON('/api/agents');
    const host = $('agents');
    host.innerHTML = '';
    d.agents.forEach(a => {
      const card = document.createElement('div');
      card.className = 'agent';
      const lr = a.last_result;
      const facts = [
        a.model_id ? `model <b>${esc(a.model_id)}</b>` : '',
        `active <b>${ago(a.age_sec)}</b>`,
        `pending <b>${a.pending}</b>`,
        a.total_cost_usd != null
          ? `spend <b>$${a.total_cost_usd.toFixed(4)}</b>` : '',
        lr ? `last turn <b class="${lr.ok ? 's-working' : 's-hung'}">${lr.ok ? 'ok' : 'ERROR'}</b> ${fmtTime(lr.ts)}` : '',
      ].filter(Boolean).join(' · ');

      const diag = `<div class="diagnosis s-${a.status}">${esc(a.diagnosis || '')}</div>`;
      const inflight = a.inflight
        ? `<div class="inflight">⛔ blocked on <code>${esc(a.inflight)}</code></div>` : '';
      const pend = (a.pending_preview && a.pending_preview.length)
        ? `<div class="pending-list"><div class="plabel">unanswered queue (${a.pending}):</div>` +
          a.pending_preview.map(m =>
            `<div class="ev-line"><span style="color:${roleColor(m.from)}">@${esc(m.from)}</span>` +
            ` ${esc(m.snippet)}</div>`).join('') +
          (a.pending > a.pending_preview.length
            ? `<div class="ev-line">… ${a.pending - a.pending_preview.length} more</div>` : '') +
          `</div>`
        : '';
      const recent = (a.recent || []).slice().reverse().map(recentLine).join('') ||
        '<div class="ev-line">(no trace events)</div>';

      card.innerHTML =
        `<div class="row1">` +
          `<span class="dot bg-${a.status}"></span>` +
          `<span class="name" style="color:${roleColor(a.role)}">@${esc(a.role)}</span>` +
          `<span class="status s-${a.status}">${a.status}</span>` +
          `<span class="facts">${facts}</span>` +
        `</div>` +
        diag + inflight + pend +
        `<details class="recent-d"><summary>recent trace (${(a.recent || []).length})</summary>` +
        `<div class="recent">${recent}</div></details>` +
        `<div class="agent-actions">` +
          `<button class="restart" data-role="${esc(a.role)}" data-mode="slim" type="button">slim (compact)</button>` +
          `<button class="restart" data-role="${esc(a.role)}" data-mode="soft" type="button">restart</button>` +
          `<button class="restart" data-role="${esc(a.role)}" data-mode="reanchor" type="button">restart + clear&#8209;tape</button>` +
        `</div>`;
      host.appendChild(card);
    });
    $('agents-updated').textContent = 'updated ' + fmtTime(d.now);
  } catch (e) {
    $('agents').innerHTML = `<div class="hint">agents load failed: ${esc(e.message)}</div>`;
  }
}
$('agents-refresh').addEventListener('click', loadAgents);

async function doRestart(role, mode) {
  const blurbs = {
    slim: 'SLIM @' + role + ' (compact).\n\nSummarizes older turns into a summary and keeps the recent working thread — shrinks the tape WITHOUT wiping context or interrupting the task. Best for a long-but-healthy agent (e.g. TL) whose tape is growing. Runs a model call; fails safe (tape untouched on failure).',
    soft: 'Restart @' + role + ' (soft).\n\nIn sagent\'s single-process model this clears the agent\'s history and forces a fresh claude --print subprocess on the next turn. The inbox is preserved.',
    reanchor: 'Restart @' + role + ' + CLEAR TAPE (re-anchor).\n\nClears the agent\'s history (durable barrier → tiny re-feed, avoids the catalog-timeout wedge), drops its backlog, and re-seeds it with the last couple of turns + a "re-sync before acting" directive: TL reads the worklog/PR history and checks with the operator; everyone else asks TL for instruction.',
  };
  if (!confirm(blurbs[mode] || blurbs.soft)) return;
  const out = $('restart-out');
  out.hidden = false;
  out.textContent = `${mode === 'slim' ? 'slimming' : 'restarting'} @${role} (${mode})…`;
  document.querySelectorAll('.restart').forEach(b => b.disabled = true);
  try {
    const r = await fetch('/api/restart', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ role, mode }),
    });
    const d = await r.json();
    out.textContent =
      (d.ok ? `✓ restarted @${role}` : `✗ restart failed for @${role}`) +
      (d.error ? '\n' + d.error : '') +
      (d.output ? '\n\n' + d.output : '');
  } catch (e) {
    out.textContent = `✗ restart request failed: ${esc(e.message)}`;
  } finally {
    setTimeout(loadAgents, 1500);
  }
}
$('agents').addEventListener('click', (e) => {
  const btn = e.target.closest('.restart');
  if (btn) doRestart(btn.dataset.role, btn.dataset.mode);
});

// ---- theme ----
(function () {
  const btn = $('theme-toggle');
  const sync = () => { btn.textContent = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark'; };
  sync();
  btn.addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'light' ? null : 'light';
    if (next) document.documentElement.setAttribute('data-theme', next);
    else document.documentElement.removeAttribute('data-theme');
    try { localStorage.setItem('channel-theme', next || 'dark'); } catch (e) {}
    sync();
  });
})();

// ---- boot ----
(function () {
  const p = new URLSearchParams(location.search);
  if (p.get('scope')) $('scope').value = p.get('scope');
  if (p.get('q') || location.hash === '#search') {
    if (p.get('q')) $('q').value = p.get('q');
    showView('search');
    if (p.get('q')) runSearch();
  } else {
    showView('agents');
  }
})();
</script>
