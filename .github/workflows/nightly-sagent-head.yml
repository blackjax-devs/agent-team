name: nightly-sagent-head

# DRIFT DETECTOR (separate from CI on purpose).
#
# CI (ci.yml) tests against the PINNED sagent git-ref — the stable, known-good
# surface. This workflow instead installs sagent from rekursiv-ai/sagent @ HEAD
# (the live `main` branch) and runs the same suite. A FAILING run here is the
# signal: upstream sagent main changed something that breaks agent-team, before
# we ever bump our pin. It does not gate anything (own status, own badge).
#
# How: rewrite the [tool.uv.sources] pin from `rev = "<sha>"` to `branch =
# "main"` and drop the lock so `uv sync` re-resolves sagent to current HEAD.
# (Once sagent ships the merged provider work on PyPI and we depend on
# `sagent>=0.1.7`, this can track `main` to preview the *next* release instead.)

on:
  schedule:
    # 04:47 UTC daily — offset from CI's nightly (03:17) and off the hour.
    - cron: "47 4 * * *"
  workflow_dispatch: {}

jobs:
  sagent-head:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Point the sagent pin at upstream HEAD (main)
        run: |
          python - <<'PY'
          import re, pathlib
          p = pathlib.Path("pyproject.toml")
          t = p.read_text()
          # In [tool.uv.sources], replace the sagent rev pin with branch=main so
          # resolution tracks the live HEAD instead of our frozen commit.
          new, n = re.subn(r'(\bsagent\s*=\s*\{[^}]*?)rev\s*=\s*"[^"]*"',
                           r'\1branch = "main"', t)
          if n == 0:
              raise SystemExit("no sagent rev pin found to retarget — adjust this workflow")
          p.write_text(new)
          PY
          grep -A3 '\[tool.uv.sources\]' pyproject.toml
          # Drop the lock so uv re-resolves sagent against current main HEAD.
          rm -f uv.lock

      - name: Sync against sagent HEAD
        run: uv sync

      - name: Report resolved sagent
        run: uv run python -c "import sagent, importlib.metadata as m; print('sagent', m.version('sagent'), '->', sagent.__file__)"

      - name: Run test suite against sagent HEAD
        run: uvx --with-editable . --with pytest pytest -q

      - name: Framework import smoke against sagent HEAD
        run: |
          cd "$RUNNER_TEMP"
          uv run --project "$GITHUB_WORKSPACE" python -c "import agent_team; from agent_team.team_profile import load_profile; load_profile(); from agent_team.serve import main; assert callable(main)"

      - name: Console script --help (sagent HEAD)
        run: uv run agent-team --help
