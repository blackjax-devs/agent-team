name: nightly-sagent-head

# DRIFT DETECTOR (separate from CI on purpose).
#
# CI (ci.yml) tests against our PINNED, known-good sagent commit. This workflow
# instead resolves sagent from main HEAD and runs the same suite PLUS the
# provider-signature smoke, so we learn — nightly — if sagent main drifts away from
# the API agent-team targets. (It caught exactly this once: a transient copybara
# export bug dropped extra_mcp_servers / session_id / subprocess_read_timeout_sec
# from model() — fixed upstream, #197 / PR #198.) A FAILING run here is the signal
# that main regressed again before we bump the pin. It gates nothing — own status.
#
# How: rewrite the direct-URL sagent pin in pyproject.toml from @<rev> to @main so
# `uv sync` re-resolves to current HEAD.

on:
  schedule:
    # 04:47 UTC daily — offset from CI's nightly (03:17) and off the hour.
    - cron: "47 4 * * *"
  workflow_dispatch: {}

jobs:
  sagent-head:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Retarget the sagent dep at upstream HEAD (main)
        run: |
          python - <<'PY'
          import re, pathlib
          p = pathlib.Path("pyproject.toml")
          t = p.read_text()
          # Rewrite the direct-URL sagent pin (…/sagent.git@<rev-or-branch>) to @main.
          new, n = re.subn(
              r'(sagent @ git\+https://github\.com/rekursiv-ai/sagent\.git@)[^"\s]+',
              r'\1main', t)
          if n == 0:
              raise SystemExit("no sagent direct-URL pin found to retarget — adjust this workflow")
          p.write_text(new)
          PY
          grep -n 'sagent @ git' pyproject.toml

      - name: Sync against sagent HEAD
        run: uv sync

      - name: Report resolved sagent
        run: uv run python -c "import sagent, importlib.metadata as m; print('sagent', m.version('sagent'), '->', sagent.__file__)"

      - name: Run test suite against sagent HEAD
        run: uvx --with-editable . --with pytest pytest -q

      # The load-bearing check: assert sagent main's AnthropicCLI.model() still
      # accepts the kwargs roles/common.py passes. This is what catches a model()
      # signature drift on main — the plain import smoke does not reach it. (Right
      # now this is EXPECTED TO FAIL: main's export dropped all three kwargs. A red
      # run here = main still incompatible; do not bump the pin.)
      - name: Provider signature smoke against sagent HEAD
        run: |
          uv run python -c "import inspect; from sagent.providers import AnthropicCLI; have=set(inspect.signature(AnthropicCLI.model).parameters); need={'extra_mcp_servers','session_id','subprocess_read_timeout_sec'}; miss=need-have; assert not miss, f'sagent main AnthropicCLI.model() is missing: {sorted(miss)} — agent-team cannot migrate yet'; print('provider model() signature OK on main:', sorted(need))"
