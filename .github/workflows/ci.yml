name: CI

# Triggers: every push/PR to main, plus a nightly schedule.
#
# agent-team TRACKS sagent main (a direct-URL dep in pyproject.toml, no lock pin),
# so every `uv sync` here re-resolves to the current main HEAD. That makes this CI
# the drift detector: if a sagent main commit breaks our API usage (the #177
# surface — session_id / subprocess_read_timeout_sec on model(), the
# CancelledError->SIGINT interrupt path — or anything after), CI goes red on the
# next push or the nightly run rather than silently at a future feature push.
# (This replaces the old separate nightly-sagent-head drift workflow, now that
# the default dep IS main.)
#
# TODO(repin): once sagent ships the merged provider work in a PyPI release
# (>=0.1.7), switch the dep to a plain `sagent>=0.1.7` for reproducible installs;
# a nightly can then preview main rather than being load-bearing.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 03:17 UTC daily — off the top of the hour to avoid GitHub's cron rush.
    - cron: "17 3 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # sagent is a direct-URL dep tracking main (pyproject.toml); uv re-resolves
      # it to the current HEAD (no lock pin), so this run reflects live main.
      - name: Sync dependencies
        run: uv sync

      # pytest is not a project dependency, so bring it in just for the run.
      - name: Run test suite
        run: uvx --with-editable . --with pytest pytest -q

      # Framework import smoke: package import + bundled-default profile load
      # (no AGENT_TEAM_PROFILE_DIR — exercises the in-package default that
      # ships as package data) + serve entry point is callable. Run from a
      # different cwd so it proves the install does not rely on a source path.
      - name: Framework import smoke
        run: |
          cd "$RUNNER_TEMP"
          uv run --project "$GITHUB_WORKSPACE" python -c "import agent_team; from agent_team.team_profile import load_profile; load_profile(); from agent_team.serve import main; assert callable(main)"

      # Console-script smoke: --help must print usage and exit 0 without booting.
      - name: Console script --help
        run: uv run agent-team --help
