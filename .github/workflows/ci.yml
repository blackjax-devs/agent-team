name: CI

# Triggers: every push/PR to main, plus a nightly schedule.
#
# agent-team pins sagent to a KNOWN-GOOD rev (direct-URL dep in pyproject.toml),
# because main's provider API is mid-rework: main's AnthropicCLI.model() dropped
# extra_mcp_servers / session_id / subprocess_read_timeout_sec, which
# roles/common.py passes — so @main breaks the channel boot. This CI tests the
# stable pinned rev; the separate nightly-sagent-head.yml resolves sagent main +
# boot-constructs the agents to warn us when main drifts further.
#
# Note the BOOT-CONSTRUCT smoke below: the import smoke alone does NOT call
# provider.model(), so it missed exactly this kind of drift — _build_all_agents()
# is what actually exercises the provider signature. (That gap let a @main bump
# pass CI green while the channel failed to boot for a real user.)
#
# TODO(repin): once sagent stabilizes / ships >=0.1.7, switch the dep to a plain
# `sagent>=0.1.7` (reproducible installs); the nightly can then just preview main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 03:17 UTC daily — off the top of the hour to avoid GitHub's cron rush.
    - cron: "17 3 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # sagent is a direct-URL dep pinned to a known-good rev (pyproject.toml).
      - name: Sync dependencies
        run: uv sync

      # pytest is not a project dependency, so bring it in just for the run.
      - name: Run test suite
        run: uvx --with-editable . --with pytest pytest -q

      # Framework import smoke: package import + bundled-default profile load
      # (no AGENT_TEAM_PROFILE_DIR — exercises the in-package default that
      # ships as package data) + serve entry point is callable. Run from a
      # different cwd so it proves the install does not rely on a source path.
      - name: Framework import smoke
        run: |
          cd "$RUNNER_TEMP"
          uv run --project "$GITHUB_WORKSPACE" python -c "import agent_team; from agent_team.team_profile import load_profile; load_profile(); from agent_team.serve import main; assert callable(main)"

      # Boot-construct smoke: actually BUILD all agents (calls provider.model()
      # per role — the provider-signature surface). The import smoke above never
      # reaches this, so it cannot catch a sagent model() signature change; this
      # step can. No claude subprocess is spawned (that starts on the first turn).
      - name: Boot-construct smoke
        run: |
          cd "$RUNNER_TEMP"
          SAGENT_DATA_DIR="$RUNNER_TEMP/data" uv run --project "$GITHUB_WORKSPACE" python -c "from agent_team.team_profile import load_profile; from agent_team.serve import _build_all_agents; a=_build_all_agents(load_profile()); assert sorted(a)==['junior-swe','statistician','swe','tech-writer','tl'], a; print('boot-construct OK:', sorted(a))"

      # Console-script smoke: --help must print usage and exit 0 without booting.
      - name: Console script --help
        run: uv run agent-team --help
