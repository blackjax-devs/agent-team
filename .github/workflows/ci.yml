name: CI

# Triggers: every push/PR to main, plus a nightly schedule.
#
# agent-team pins sagent to a specific KNOWN-GOOD main commit (direct-URL dep in
# pyproject.toml) for reproducible installs. A transient copybara export bug once
# dropped extra_mcp_servers / session_id / subprocess_read_timeout_sec from
# AnthropicCLI.model() (which roles/common.py passes) — fixed upstream (#197/#198),
# but the machine export can hiccup, so we pin a commit rather than @main. This CI
# tests the pinned commit; the separate nightly-sagent-head.yml resolves sagent
# @main and re-checks the provider signature to warn us if a re-drop lands.
#
# Note the PROVIDER-SIGNATURE smoke below: the import smoke alone never calls
# provider.model(), so it can't see a model() signature change — the signature
# smoke (inspect AnthropicCLI.model) is what catches a dropped kwarg. The mock test
# in tests/ covers the other half: that common.py still PASSES those kwargs.
#
# TODO(repin): once sagent ships a PyPI release (>=0.1.7), switch the dep to a
# plain `sagent>=0.1.7` (reproducible installs); the nightly can then just preview main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 03:17 UTC daily — off the top of the hour to avoid GitHub's cron rush.
    - cron: "17 3 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # sagent is a direct-URL dep pinned to a known-good rev (pyproject.toml).
      - name: Sync dependencies
        run: uv sync

      # pytest is not a project dependency, so bring it in just for the run.
      # pytest-asyncio: the vendored cli_session tripwire suite has async tests
      # (asyncio_mode=auto in pyproject); without it they run as silent no-ops.
      - name: Run test suite
        run: uvx --with-editable . --with pytest --with pytest-asyncio pytest -q

      # Framework import smoke: package import + bundled-default profile load
      # (no AGENT_TEAM_PROFILE_DIR — exercises the in-package default that
      # ships as package data) + serve entry point is callable. Run from a
      # different cwd so it proves the install does not rely on a source path.
      - name: Framework import smoke
        run: |
          cd "$RUNNER_TEMP"
          uv run --project "$GITHUB_WORKSPACE" python -c "import agent_team; from agent_team.team_profile import load_profile; load_profile(); from agent_team.serve import main; assert callable(main)"

      # Provider-signature smoke: assert sagent's AnthropicCLI.model() still
      # accepts the kwargs roles/common.py passes. A full _build_all_agents()
      # would need claude credentials (AnthropicCLI.from_credentials()), which CI
      # lacks — but the drift that bit us is a model() SIGNATURE change, and this
      # catches that headlessly. (The @main export that dropped extra_mcp_servers
      # fails here; the import smoke above never reaches provider.model().)
      - name: Provider signature smoke
        run: |
          uv run python -c "import inspect; from sagent.providers import AnthropicCLI; have=set(inspect.signature(AnthropicCLI.model).parameters); need={'extra_mcp_servers','session_id','subprocess_read_timeout_sec'}; miss=need-have; assert not miss, f'sagent AnthropicCLI.model() dropped kwargs agent-team passes: {sorted(miss)}'; print('provider model() signature OK:', sorted(need))"

      # Console-script smoke: --help must print usage and exit 0 without booting.
      - name: Console script --help
        run: uv run agent-team --help
